name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile program
        run: gcc vuln.c -o vuln -no-pie

      - name: Build Docker image
        run: docker build -t vuln-image .

      - name: Run container test
        run: |
          docker run -d -p 1337:1337 --name vuln-test vuln-image
          sleep 2
          nc -vz localhost 1337
          docker stop vuln-test

      - name: Deploy binary
        run: |
          mkdir deploy
          cp vuln deploy/
          echo "Deployment complete"

      - name: Upload deployed binary
        uses: actions/upload-artifact@v4
        with:
          name: vuln-binary
          path: deploy/vuln
